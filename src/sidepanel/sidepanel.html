<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PersonPeek Side Panel</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <!-- ===== Header ===== -->
  <header class="panel-header">
    <div class="panel-header-top">
      <div class="panel-logo">
        <svg class="panel-logo-icon" width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="10" r="5" stroke="url(#logoGrad)" stroke-width="2" fill="none"/>
          <path d="M4 24c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="url(#logoGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
              <stop offset="0%" stop-color="#6C63FF"/>
              <stop offset="100%" stop-color="#00D4AA"/>
            </linearGradient>
          </defs>
        </svg>
        <h1 class="panel-logo-text">PersonPeek</h1>
      </div>

    </div>
    <p class="panel-tagline">Discover anyone instantly</p>
  </header>

  <!-- ===== Search Section ===== -->
  <section class="panel-search">
    <form id="searchForm" class="panel-search-form" autocomplete="off">
      <div class="panel-search-input-wrap">
        <svg class="panel-search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="7" cy="7" r="5.5" stroke="#9A9AB0" stroke-width="1.5"/>
          <line x1="11" y1="11" x2="14.5" y2="14.5" stroke="#9A9AB0" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input
          type="text"
          id="searchInput"
          class="panel-search-input"
          placeholder="Search any person…"
          spellcheck="false"
        />
      </div>
      <button type="submit" id="searchBtn" class="panel-search-btn">
        <span class="panel-search-btn-text">Search</span>
        <svg class="panel-search-btn-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </form>
  </section>

  <!-- ===== Loading Spinner ===== -->
  <section id="loadingState" class="panel-loading hidden">
    <div class="panel-spinner"></div>
    <p class="panel-loading-text">Looking up person…</p>
  </section>

  <!-- ===== Error State ===== -->
  <section id="errorState" class="panel-error hidden">
    <svg class="panel-error-icon" width="40" height="40" viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="18" stroke="#FF6B6B" stroke-width="2" fill="none"/>
      <line x1="20" y1="12" x2="20" y2="22" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
      <circle cx="20" cy="27" r="1.5" fill="#FF6B6B"/>
    </svg>
    <p id="errorMessage" class="panel-error-text">Something went wrong. Please try again.</p>
  </section>

  <!-- ===== Result Card ===== -->
  <section id="resultState" class="panel-result hidden">
    <button id="backBtn" class="panel-back-btn" type="button" aria-label="Back to search">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Back</span>
    </button>

    <div class="result-card">
      <div class="result-header">
        <img id="resultPhoto" class="result-photo" src="" alt="Person photo" />
        <div class="result-header-info">
          <h2 id="resultName" class="result-name"></h2>
          <p id="resultDesc" class="result-desc"></p>
        </div>
      </div>

      <div id="resultFacts" class="result-facts"></div>
      <div id="resultBio" class="result-bio"></div>
      <a id="resultLink" class="result-link" href="#" target="_blank" rel="noopener noreferrer">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M5.5 2H3a1 1 0 00-1 1v8a1 1 0 001 1h8a1 1 0 001-1V8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M8 2h4v4M7 7l5-5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Read on Wikipedia</span>
      </a>
    </div>
  </section>



  <!-- ===== Recent Lookups Section ===== -->
  <section id="recentState" class="panel-recent">
    <div class="panel-recent-header">
      <h3 class="panel-recent-title">Recent Lookups</h3>
      <button id="clearHistoryBtn" class="panel-recent-clear" type="button">Clear all</button>
    </div>
    <ul id="recentList" class="panel-recent-list"></ul>
  </section>

  <!-- ===== Empty State ===== -->
  <section id="emptyState" class="panel-empty hidden">
    <svg class="panel-empty-icon" width="56" height="56" viewBox="0 0 56 56" fill="none">
      <circle cx="28" cy="22" r="9" stroke="#6C63FF" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M10 46c0-9.941 8.059-18 18-18s18 8.059 18 18" stroke="#6C63FF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
      <circle cx="28" cy="22" r="4" stroke="#00D4AA" stroke-width="1.5" fill="none" opacity="0.7"/>
    </svg>
    <p class="panel-empty-title">No recent lookups</p>
    <p class="panel-empty-desc">Search for anyone to learn about them instantly</p>
  </section>

  <!-- ===== Footer ===== -->
  <footer class="panel-footer">
    <span class="panel-footer-text">Powered by</span>
    <svg class="panel-footer-wiki-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M1 2l3.5 10L7 5l2.5 7L13 2" stroke="#9A9AB0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="panel-footer-text">Wikipedia</span>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
